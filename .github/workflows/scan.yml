name: Stratify Daily Scan

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-stratify
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests PyGithub

      - name: Run scanner
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ secrets.GH_REPO }}
        run: python3 scanner_market.py

      - name: Commit scan results
        run: |
          git config user.name "Stratify Bot"
          git config user.email "bot@stratify.app"
          git add market_data.json fundamentals_cache.json
          git diff --staged --quiet || git commit -m "Scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
